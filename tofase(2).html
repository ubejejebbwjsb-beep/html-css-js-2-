<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Tofase(2).css">
    <title>To Do List</title>
</head>
<body>
    <div class="app">
    <h1 id="title">To Do List</h1>
    <p>Enter your tasks below:</p>
    <input type="text" id="taskInput" placeholder="Enter a new task">
    <button type="button" id="addTask">Add Task</button>
    <p id="message"></p>
    <p>Total tasks: <span id="taskCount"></span></p>
    <ul id="taskList"></ul>
    <script src="Tofase(2).js"></script>
    </div>
</body>
</html>
